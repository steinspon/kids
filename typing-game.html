<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff9f68" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Kids Tools" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>Typing Fun Deluxe</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #ffe8f3;
      --bg2: #fff8d6;
      --ink: #5f3b76;
      --panel: rgba(255,255,255,0.28);
      --shadow: rgba(0,0,0,0.12);
      --bar-a: #ff7db2;
      --bar-b: #ff9f68;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      transition: background 500ms ease;
      -webkit-text-size-adjust: 100%;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .header-bar {
      position: absolute;
      top: calc(16px + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      width: min(95vw, 1120px);
      min-height: 56px;
      padding: 10px 16px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: linear-gradient(90deg, var(--bar-a), var(--bar-b));
      box-shadow: rgba(0, 0, 0, 0.2) 0px 5px 15px, rgba(255, 125, 178, 0.45) 5px 10px 15px;
    }

    .bar-brand {
      color: #fff;
      text-decoration: none;
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .bar-pill {
      color: #fff;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: clamp(12px, 1.2vw, 15px);
      font-weight: 700;
      white-space: nowrap;
    }
    .bar-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .home-link {
      text-decoration: none;
      color: #fff;
      background: rgba(255, 255, 255, 0.24);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: clamp(12px, 1.2vw, 15px);
      font-weight: 800;
      white-space: nowrap;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }

    a, button, input, select, textarea {
      touch-action: manipulation;
      font-size: 16px;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      outline: none;
    }

    .floating-shapes {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .shape {
      position: absolute;
      border-radius: 999px;
      opacity: 0.22;
      animation: drift linear infinite;
      filter: blur(1px);
    }

    @keyframes drift {
      0%   { transform: translateY(10vh) translateX(0px); }
      100% { transform: translateY(-120vh) translateX(20px); }
    }

    .title {
      position: absolute;
      top: 88px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.94);
      border-radius: 24px;
      padding: 16px 24px;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: 700;
      color: var(--ink);
      box-shadow: 0 8px 24px var(--shadow);
      text-align: center;
      z-index: 20;
    }

    .toolbar {
      position: absolute;
      top: 88px;
      right: 20px;
      z-index: 20;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 14px 18px;
      font-size: clamp(15px, 1.5vw, 20px);
      font-weight: 700;
      background: rgba(255,255,255,0.95);
      color: var(--ink);
      box-shadow: 0 8px 24px var(--shadow);
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .character-wrap {
      position: absolute;
      top: 164px;
      right: 22px;
      z-index: 18;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      pointer-events: none;
    }

    .character {
      font-size: clamp(42px, 5.2vw, 70px);
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.12));
      transform-origin: center;
      transition: transform 160ms ease;
    }

    .character.bounce {
      animation: characterBounce 350ms ease;
    }

    @keyframes characterBounce {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.22) translateY(-8px); }
      100% { transform: scale(1); }
    }

    .status {
      background: rgba(255,255,255,0.92);
      border-radius: 18px;
      padding: 8px 14px;
      color: #444;
      font-size: clamp(14px, 1.4vw, 19px);
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      text-align: center;
      min-width: 160px;
    }

    .text-stage {
      position: relative;
      z-index: 10;
      width: min(92vw, 1100px);
      min-height: min(56vh, 680px);
      padding: 28px 34px;
      border-radius: 28px;
      background: var(--panel);
      box-shadow: inset 0 0 0 3px rgba(255,255,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .typed-text {
      width: 100%;
      text-align: center;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
      font-size: clamp(42px, 7vw, 108px);
      font-weight: 900;
      line-height: 1.18;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-shadow: 0 8px 18px rgba(0,0,0,0.10);
      user-select: none;
      min-height: 1.2em;
    }

    .typed-char {
      display: inline-block;
      animation: popIn 240ms ease;
      transform-origin: center bottom;
    }

    @keyframes popIn {
      0%   { transform: translateY(16px) scale(0.55) rotate(-8deg); opacity: 0; }
      60%  { transform: translateY(-3px) scale(1.15) rotate(3deg); opacity: 1; }
      100% { transform: translateY(0px) scale(1) rotate(0deg); opacity: 1; }
    }

    .caret {
      display: inline-block;
      width: 0.08em;
      height: 1em;
      margin-left: 0.06em;
      vertical-align: -0.08em;
      background: currentColor;
      border-radius: 999px;
      animation: blink 0.9s steps(1) infinite;
    }

    @keyframes blink {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      border-radius: 20px;
      padding: 12px 18px;
      font-size: clamp(16px, 2vw, 24px);
      color: #444;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      z-index: 20;
      text-align: center;
      max-width: calc(100% - 30px);
    }

    .particle {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      pointer-events: none;
      z-index: 12;
      animation: particleFly 700ms ease-out forwards;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.35) inset;
    }

    @keyframes particleFly {
      0% {
        transform: translate(0px, 0px) scale(0.4);
        opacity: 1;
      }
      100% {
        transform: translate(var(--dx), var(--dy)) scale(1.2);
        opacity: 0;
      }
    }

    .screen.flash {
      animation: screenFlash 300ms ease;
    }

    @keyframes screenFlash {
      0%   { filter: brightness(1); }
      35%  { filter: brightness(1.16); }
      100% { filter: brightness(1); }
    }

    @media (max-width: 700px) {
      .toolbar {
        top: 88px;
        right: 12px;
        max-width: 55vw;
      }

      .character-wrap {
        top: 154px;
        right: 10px;
      }

      .header-bar {
        width: calc(100% - 16px);
        top: calc(8px + env(safe-area-inset-top));
        padding: 9px 12px;
      }

      .bar-pill { display: none; }

      .home-link {
        padding: 6px 10px;
      }

      .text-stage {
        width: 94vw;
        min-height: 50vh;
        padding: 22px;
      }

      .hint {
        width: calc(100% - 24px);
      }
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <a class="bar-brand" href="index.html">Kids Tools</a>
    <div class="bar-right">
      <div class="bar-pill">Typing practice time</div>
      <a class="home-link" href="index.html">Home</a>
    </div>
  </div>

  <div class="screen" id="screen" tabindex="0" aria-label="Typing game area">
    <div class="floating-shapes" id="floatingShapes"></div>

    <div class="title">Typing Fun Deluxe</div>

    <div class="toolbar">
      <button id="clearBtn" type="button">Clear screen</button>
      <button id="surpriseBtn" type="button">Surprise</button>
    </div>

    <div class="character-wrap">
      <div class="character" id="character">😊</div>
      <div class="status" id="statusText">Type something</div>
    </div>

    <div class="text-stage" id="textStage">
      <div class="typed-text" id="typedText"><span class="caret"></span></div>
    </div>

    <div class="hint">Letters stay in the middle. Enter = new line. Backspace = erase. Delete or Clear screen = wipe all.</div>
  </div>

  <script>
    const screen = document.getElementById('screen');
    const typedText = document.getElementById('typedText');
    const textStage = document.getElementById('textStage');
    const clearBtn = document.getElementById('clearBtn');
    const surpriseBtn = document.getElementById('surpriseBtn');
    const character = document.getElementById('character');
    const statusText = document.getElementById('statusText');
    const floatingShapes = document.getElementById('floatingShapes');
    let currentText = '';
    let audioContext;
    let idleTimer;
    let bgIndex = 0;

    const palettes = [
      ['#ff4d6d', '#ffd166'],
      ['#c77dff', '#80ffdb'],
      ['#7b2cbf', '#ffd6a5'],
      ['#00b4d8', '#caf0f8'],
      ['#ff9f1c', '#ffbf69']
    ];

    const letterColors = [
      '#ff4d6d', '#ff9f1c', '#ffd166', '#06d6a0',
      '#118ab2', '#7b2cbf', '#f15bb5', '#00bbf9'
    ];

    function createBackgroundShapes() {
      for (let i = 0; i < 12; i++) {
        const s = document.createElement('div');
        s.className = 'shape';
        const size = 50 + Math.random() * 120;
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.left = Math.random() * 100 + '%';
        s.style.bottom = (-10 - Math.random() * 80) + 'px';
        s.style.background = letterColors[Math.floor(Math.random() * letterColors.length)];
        s.style.animationDuration = (14 + Math.random() * 18) + 's';
        s.style.animationDelay = (-Math.random() * 20) + 's';
        floatingShapes.appendChild(s);
      }
    }

    function getAudioContext() {
      if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioCtx();
      }
      if (audioContext.state === 'suspended') {
        audioContext.resume();
      }
      return audioContext;
    }

    function tone(frequency, duration, type='sine', volume=0.05, slideTo=null) {
      const ctx = getAudioContext();
      const now = ctx.currentTime;

      const osc = ctx.createOscillator();
      const gain = ctx.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(frequency, now);
      if (slideTo) {
        osc.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
      }

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);

      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playKeySound(key) {
      const lower = key.toLowerCase();
      if ('aeiouyæøå'.includes(lower)) {
        tone(660, 0.10, 'triangle', 0.045, 800);
      } else {
        tone(420, 0.07, 'square', 0.04, 300);
      }
    }

    function playEnterSound() {
      tone(520, 0.08, 'triangle', 0.05, 700);
      setTimeout(() => tone(760, 0.12, 'triangle', 0.045, 1000), 55);
    }

    function playClearSound() {
      tone(700, 0.08, 'sawtooth', 0.045, 500);
      setTimeout(() => tone(420, 0.12, 'sawtooth', 0.04, 220), 40);
    }

    function playCelebrateSound() {
      tone(523, 0.09, 'triangle', 0.05, 659);
      setTimeout(() => tone(659, 0.09, 'triangle', 0.05, 784), 80);
      setTimeout(() => tone(784, 0.14, 'triangle', 0.055, 1047), 160);
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function colorForChar(index) {
      return letterColors[index % letterColors.length];
    }

    function renderText() {
      const chars = currentText.split('');
      let html = '';

      chars.forEach((ch, i) => {
        if (ch === '\n') {
          html += '<br>';
        } else if (ch === ' ') {
          html += `<span class="typed-char" style="color:${colorForChar(i)};">&nbsp;</span>`;
        } else {
          html += `<span class="typed-char" style="color:${colorForChar(i)};">${escapeHtml(ch)}</span>`;
        }
      });

      typedText.innerHTML = html + '<span class="caret"></span>';
    }

    function setCharacter(emoji, status) {
      character.textContent = emoji;
      statusText.textContent = status;
      character.classList.remove('bounce');
      void character.offsetWidth;
      character.classList.add('bounce');
    }

    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(() => {
        setCharacter('👋', 'Type more');
      }, 5000);
    }

    function cycleBackground() {
      bgIndex = (bgIndex + 1) % palettes.length;
      const [c1, c2] = palettes[bgIndex];
      document.documentElement.style.setProperty('--bg1', c1);
      document.documentElement.style.setProperty('--bg2', c2);
    }

    function centerPoint() {
      const rect = textStage.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2
      };
    }

    function burstParticles(count = 12, big = false) {
      const point = centerPoint();
      const colors = letterColors;

      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = (big ? 18 : 10) + Math.random() * (big ? 22 : 14);
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = point.x + 'px';
        p.style.top = point.y + 'px';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];

        const angle = Math.random() * Math.PI * 2;
        const distance = (big ? 90 : 40) + Math.random() * (big ? 170 : 80);
        p.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);

        screen.appendChild(p);
        setTimeout(() => p.remove(), 750);
      }
    }

    function flashScreen() {
      screen.classList.remove('flash');
      void screen.offsetWidth;
      screen.classList.add('flash');
    }

    function clearScreen() {
      currentText = '';
      renderText();
      setCharacter('🧽', 'All clean');
      playClearSound();
      burstParticles(16, true);
      cycleBackground();
      resetIdleTimer();
      screen.focus();
    }

    function celebrate(message = 'Great job!') {
      setCharacter('🤩', message);
      playCelebrateSound();
      burstParticles(24, true);
      flashScreen();
      cycleBackground();
    }

    function checkSpecialWords() {
      const lowered = currentText.toLowerCase();
      const targets = [
        'mama',
        'papa',
        'wow',
        'hei',
        'hello'
      ];

      for (const t of targets) {
        if (lowered.includes(t)) {
          celebrate(`You typed ${t.toUpperCase()}!`);
          return;
        }
      }
    }

    function handleKey(event) {
      const key = event.key;

      if (
        event.ctrlKey || event.metaKey || event.altKey ||
        key === 'Shift' || key === 'CapsLock' || key === 'Escape' ||
        key === 'ArrowLeft' || key === 'ArrowRight' || key === 'ArrowUp' || key === 'ArrowDown'
      ) {
        return;
      }

      resetIdleTimer();

      if (key === 'Tab') {
        event.preventDefault();
        currentText += '    ';
        playKeySound(' ');
        burstParticles(6, false);
        setCharacter('😄', 'Tabs make spaces');
        renderText();
        return;
      }

      if (key === 'Enter') {
        event.preventDefault();
        currentText += '\n';
        renderText();
        setCharacter('🎉', 'New line');
        playEnterSound();
        burstParticles(22, true);
        flashScreen();
        cycleBackground();
        return;
      }

      if (key === 'Backspace') {
        event.preventDefault();
        currentText = currentText.slice(0, -1);
        renderText();
        setCharacter('🙂', 'Boop');
        tone(320, 0.06, 'square', 0.03, 220);
        return;
      }

      if (key === 'Delete') {
        event.preventDefault();
        clearScreen();
        return;
      }

      if (key === ' ') {
        event.preventDefault();
        currentText += ' ';
        renderText();
        setCharacter('😆', 'Space bounce');
        playKeySound(' ');
        burstParticles(10, false);
        cycleBackground();
        return;
      }

      if (key.length === 1) {
        event.preventDefault();
        currentText += key;
        renderText();
        playKeySound(key);
        burstParticles(8, false);

        if ('aeiouyæøå'.includes(key.toLowerCase())) {
          setCharacter('😄', 'Nice letter');
        } else if (/[0-9]/.test(key)) {
          setCharacter('🔢', 'Number power');
        } else {
          setCharacter('😊', 'Typing');
        }

        if (currentText.length % 8 === 0) {
          cycleBackground();
        }

        checkSpecialWords();
      }
    }

    clearBtn.addEventListener('click', clearScreen);

    surpriseBtn.addEventListener('click', () => {
      screen.focus();
      celebrate('Surprise time!');
    });

    window.addEventListener('keydown', handleKey);
    window.addEventListener('pointerdown', () => {
      screen.focus();
      getAudioContext();
      resetIdleTimer();
    });

    createBackgroundShapes();
    renderText();
    resetIdleTimer();
    screen.focus();
  </script>
</body>
</html>
